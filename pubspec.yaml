class ServiceCategory {
  final String id;
  final String name;
  final String module; // sante, beaute, restaurant, hebergement, transport, immobilier, artisan
  final String? icon;

  ServiceCategory({
    required this.id,
    required this.name,
    required this.module,
    this.icon,
  });
}

// Les 7 modules principaux de Congo Connect (affichés sur l'accueil)
// même si aucune catégorie personnalisée n'a encore été créée dans Supabase
class AppModule {
  final String key;
  final String label;
  final String emoji;

  const AppModule({
    required this.key,
    required this.label,
    required this.emoji,
  });
}

